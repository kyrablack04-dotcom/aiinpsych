<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <p class="eyebrow">AI in Psych</p>
            <h1>Notes App</h1>
            <p class="subtitle">Create, search, and delete notes backed by the FastAPI service.</p>
        </header>

        <section class="panel">
            <h2>Add a note</h2>
            <form id="create-note-form" class="note-form">
                <label class="field">
                    <span>Title</span>
                    <input id="note-title-input" name="title" type="text" maxlength="255" placeholder="Session summary" required>
                </label>
                <label class="field">
                    <span>Content</span>
                    <textarea id="note-content-input" name="content" rows="6" placeholder="Write your note here..." required></textarea>
                </label>
                <label class="field">
                    <span>Tags</span>
                    <input id="note-tags-input" name="tags" type="text" placeholder="e.g. anxiety, CBT, session notes">
                </label>
                <button id="create-note-button" type="submit">Save Note</button>
            </form>
        </section>

        <section class="panel">
            <div class="section-heading">
                <div>
                    <h2>Your notes</h2>
                    <p class="section-copy">Search by keyword across note titles and content.</p>
                </div>
            </div>
            <form id="search-form" class="search-bar">
                <input id="search-input" name="query" type="search" placeholder="Search notes by keyword">
                <button type="submit">Search</button>
                <button id="clear-search-button" type="button" class="secondary-button">Clear</button>
            </form>
            <div id="active-tag-filter" class="active-tag-filter">
                Filtering by tag: <strong id="active-tag-name"></strong>
                <button type="button" id="clear-tag-filter" class="secondary-button tag-filter-clear">&#x2715;</button>
            </div>
            <p id="status-message" class="status-message" aria-live="polite"></p>
            <div id="notes-container" class="notes-grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
